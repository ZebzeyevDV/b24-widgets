<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Фильтр договоров</title>
    <!-- BX24 JS SDK — загружается из портала Б24 -->
    <script src="https://b24.tsdc.kz/bitrix/js/rest/jquery.min.js"></script>
    <script src="https://b24.tsdc.kz/bitrix/js/rest/bx24.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            font-size: 13px;
            color: #333;
            padding: 12px;
            background: #fff;
        }
        .widget-header {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 10px;
            color: #1a1a1a;
        }
        .status {
            padding: 8px 10px;
            border-radius: 6px;
            margin-bottom: 10px;
            font-size: 12px;
            line-height: 1.4;
        }
        .status-info { background: #e8f4fd; color: #1565c0; }
        .status-error { background: #fdecea; color: #c62828; }
        .status-success { background: #e8f5e9; color: #2e7d32; }
        .status-loading { background: #fff8e1; color: #f57f17; }
        .contract-list {
            list-style: none;
            max-height: 350px;
            overflow-y: auto;
        }
        .contract-item {
            padding: 10px 12px;
            border: 1px solid #e0e0e0;
            border-radius: 6px;
            margin-bottom: 6px;
            cursor: pointer;
            transition: all 0.15s;
        }
        .contract-item:hover {
            background: #f0f7ff;
            border-color: #90caf9;
        }
        .contract-item.selected {
            background: #e3f2fd;
            border-color: #1976d2;
        }
        .contract-title {
            font-weight: 500;
            font-size: 13px;
            margin-bottom: 2px;
        }
        .contract-meta {
            font-size: 11px;
            color: #757575;
        }
        .btn {
            display: inline-block;
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            margin-top: 8px;
            transition: background 0.15s;
        }
        .btn-primary {
            background: #1976d2;
            color: #fff;
        }
        .btn-primary:hover { background: #1565c0; }
        .btn-primary:disabled {
            background: #bdbdbd;
            cursor: not-allowed;
        }
        .btn-refresh {
            background: #f5f5f5;
            color: #333;
            border: 1px solid #e0e0e0;
        }
        .btn-refresh:hover { background: #eeeeee; }
        .company-name {
            font-size: 12px;
            color: #1976d2;
            margin-bottom: 8px;
            padding: 6px 8px;
            background: #f0f7ff;
            border-radius: 4px;
        }
        .actions { display: flex; gap: 8px; }
        .empty-state {
            text-align: center;
            padding: 24px 12px;
            color: #999;
        }
        .debug-info {
            margin-top: 12px;
            padding: 8px;
            background: #fafafa;
            border: 1px solid #eee;
            border-radius: 4px;
            font-size: 11px;
            color: #999;
            display: none; /* Включить: display: block */
        }
    </style>
</head>
<body>

<div class="widget-header">Договоры контрагента</div>

<div id="statusBlock" class="status status-loading">Загрузка...</div>
<div id="companyInfo" class="company-name" style="display:none;"></div>
<ul id="contractList" class="contract-list"></ul>
<div id="emptyState" class="empty-state" style="display:none;">
    Нет договоров для этого контрагента
</div>

<div class="actions">
    <button id="btnBind" class="btn btn-primary" disabled onclick="bindContract()">
        Привязать договор
    </button>
    <button class="btn btn-refresh" onclick="loadContracts()">
        Обновить
    </button>
</div>

<div id="debugInfo" class="debug-info"></div>

<script>
// === КОНФИГУРАЦИЯ ===
var CONFIG = {
    // URL PHP-прокси (заменить при переносе на TSDC)
    proxyUrl: 'https://sitraining.kz/api/b24-proxy.php',
    
    // ID смарт-процессов
    entityPaymentRequest: 1064,   // Заявка на оплату
    entityContractList: 1068,     // СПИСОК: Договоров
    entityContractRegistry: 1072, // РЕЕСТР: Договоров
    
    // Поля для выборки из СПИСКА: Договоров
    contractFields: ['id', 'title', 'companyId', 'createdTime', 'stageId'],
};

// === СОСТОЯНИЕ ===
var state = {
    currentItemId: null,      // ID текущей заявки на оплату
    companyId: null,           // ID контрагента из заявки
    companyName: '',           // Название контрагента
    contracts: [],             // Загруженные договора
    selectedContractId: null,  // Выбранный договор
    entityTypeId: null,        // entityTypeId текущей сущности
};

// === ИНИЦИАЛИЗАЦИЯ ===
BX24.init(function() {
    debug('BX24.init OK');
    
    // Получаем контекст — ID текущего элемента
    var placement = BX24.placement.info();
    debug('Placement: ' + JSON.stringify(placement));
    
    if (placement && placement.options) {
        state.currentItemId = parseInt(placement.options.ID || placement.options.id || 0);
        state.entityTypeId = parseInt(placement.options.ENTITY_TYPE_ID || placement.options.entityTypeId || CONFIG.entityPaymentRequest);
    }
    
    if (!state.currentItemId) {
        showStatus('Не удалось определить ID элемента. Откройте виджет из карточки заявки.', 'error');
        return;
    }
    
    debug('Item ID: ' + state.currentItemId + ', EntityType: ' + state.entityTypeId);
    
    // Получаем данные текущей заявки (companyId)
    loadCurrentItem();
});

// === ЗАГРУЗКА ТЕКУЩЕЙ ЗАЯВКИ ===
function loadCurrentItem() {
    showStatus('Загрузка данных заявки...', 'loading');
    
    BX24.callMethod('crm.item.get', {
        entityTypeId: state.entityTypeId,
        id: state.currentItemId,
    }, function(result) {
        if (result.error()) {
            showStatus('Ошибка загрузки заявки: ' + result.error_description(), 'error');
            debug('Error: ' + JSON.stringify(result.error()));
            return;
        }
        
        var item = result.data().item;
        state.companyId = item.companyId || 0;
        
        debug('Company ID: ' + state.companyId);
        
        if (!state.companyId) {
            showStatus('В заявке не указан контрагент. Сначала выберите компанию.', 'info');
            return;
        }
        
        // Получаем название компании
        BX24.callMethod('crm.company.get', { id: state.companyId }, function(compResult) {
            if (!compResult.error() && compResult.data()) {
                state.companyName = compResult.data().TITLE || 'Компания #' + state.companyId;
            } else {
                state.companyName = 'Компания #' + state.companyId;
            }
            
            document.getElementById('companyInfo').textContent = state.companyName;
            document.getElementById('companyInfo').style.display = 'block';
            
            loadContracts();
        });
    });
}

// === ЗАГРУЗКА ДОГОВОРОВ ЧЕРЕЗ ПРОКСИ ===
function loadContracts() {
    if (!state.companyId) {
        showStatus('Контрагент не выбран', 'info');
        return;
    }
    
    showStatus('Загрузка договоров...', 'loading');
    
    var requestBody = {
        action: 'list',
        entityTypeId: CONFIG.entityContractList,
        filter: { companyId: state.companyId },
        select: CONFIG.contractFields,
    };
    
    fetch(CONFIG.proxyUrl, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(requestBody),
    })
    .then(function(response) {
        if (!response.ok) throw new Error('HTTP ' + response.status);
        return response.json();
    })
    .then(function(data) {
        debug('API response: ' + JSON.stringify(data).substring(0, 500));
        
        if (data.error) {
            showStatus('Ошибка API: ' + (data.error_description || data.error), 'error');
            return;
        }
        
        var items = (data.result && data.result.items) ? data.result.items : [];
        state.contracts = items;
        state.selectedContractId = null;
        
        renderContracts();
    })
    .catch(function(err) {
        showStatus('Ошибка загрузки: ' + err.message, 'error');
        debug('Fetch error: ' + err);
    });
}

// === РЕНДЕР СПИСКА ДОГОВОРОВ ===
function renderContracts() {
    var listEl = document.getElementById('contractList');
    var emptyEl = document.getElementById('emptyState');
    var btnBind = document.getElementById('btnBind');
    
    listEl.innerHTML = '';
    btnBind.disabled = true;
    
    if (state.contracts.length === 0) {
        emptyEl.style.display = 'block';
        showStatus('Найдено: 0 договоров', 'info');
        return;
    }
    
    emptyEl.style.display = 'none';
    showStatus('Найдено: ' + state.contracts.length + ' договор(ов)', 'success');
    
    state.contracts.forEach(function(contract) {
        var li = document.createElement('li');
        li.className = 'contract-item';
        li.setAttribute('data-id', contract.id);
        li.onclick = function() { selectContract(contract.id); };
        
        var titleDiv = document.createElement('div');
        titleDiv.className = 'contract-title';
        titleDiv.textContent = contract.title || 'Без названия #' + contract.id;
        
        var metaDiv = document.createElement('div');
        metaDiv.className = 'contract-meta';
        var metaParts = ['ID: ' + contract.id];
        if (contract.createdTime) {
            var date = new Date(contract.createdTime);
            metaParts.push('от ' + date.toLocaleDateString('ru-RU'));
        }
        metaDiv.textContent = metaParts.join(' | ');
        
        li.appendChild(titleDiv);
        li.appendChild(metaDiv);
        listEl.appendChild(li);
    });
    
    // Подгоняем высоту iframe
    BX24.fitWindow();
}

// === ВЫБОР ДОГОВОРА ===
function selectContract(contractId) {
    state.selectedContractId = contractId;
    
    var items = document.querySelectorAll('.contract-item');
    items.forEach(function(item) {
        item.classList.toggle('selected', parseInt(item.getAttribute('data-id')) === contractId);
    });
    
    document.getElementById('btnBind').disabled = false;
}

// === ПРИВЯЗКА ДОГОВОРА К ЗАЯВКЕ ===
function bindContract() {
    if (!state.selectedContractId || !state.currentItemId) return;
    
    showStatus('Привязка договора...', 'loading');
    document.getElementById('btnBind').disabled = true;
    
    // Обновляем через BX24 SDK (от имени текущего пользователя)
    BX24.callMethod('crm.item.update', {
        entityTypeId: state.entityTypeId,
        id: state.currentItemId,
        fields: {
            parentId1068: state.selectedContractId,
        }
    }, function(result) {
        if (result.error()) {
            showStatus('Ошибка привязки: ' + result.error_description(), 'error');
            document.getElementById('btnBind').disabled = false;
            return;
        }
        
        var contract = state.contracts.find(function(c) { return c.id === state.selectedContractId; });
        var name = contract ? contract.title : '#' + state.selectedContractId;
        showStatus('Договор «' + name + '» привязан к заявке!', 'success');
        
        // Перезагрузить карточку в Б24
        setTimeout(function() {
            BX24.reloadWindow();
        }, 1500);
    });
}

// === ВСПОМОГАТЕЛЬНЫЕ ===
function showStatus(message, type) {
    var el = document.getElementById('statusBlock');
    el.textContent = message;
    el.className = 'status status-' + type;
}

function debug(msg) {
    var el = document.getElementById('debugInfo');
    el.style.display = 'block'; // Показать при отладке
    el.innerHTML += msg + '<br>';
    console.log('[ContractFilter] ' + msg);
}
</script>

</body>
</html>
